
services:
  mongodb:
    image: mongo:6
    container_name: Mindbridge_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: Mindbridge_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ai_wellness
      - MONGODB_URI=mongodb://mongodb:27017/ai_wellness
      - NODE_ENV=production
      - FRONTEND_URL=http://13.206.121.55
      - FRONTEND_URLS=http://localhost:5173,http://127.0.0.1:5173
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://13.206.121.55:5000/api
    container_name: Mindbridge_frontend
    ports:
      - "5173:5173" # Vite dev port
      - "80:80"     # production web port
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:

# Notes:
# - Set the environment variable `IMAGE_PREFIX` when pulling images on a remote host
#   to match the Docker registry prefix you use (CI uses Docker Hub by default).
# - `env_file` entries load secrets from `./server/.env` and `./client/.env` for local runs.

    

name: CI/CD Pipeline (Docker Hub + EC2 Deployment)

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: 18

jobs:

  # =========================================================
  # BUILD & PUSH DOCKER IMAGES
  # =========================================================
  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:

      # =========================================================
      # CHECKOUT REPOSITORY
      # =========================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # SETUP NODE.JS
      # =========================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # =========================================================
      # CACHE BACKEND DEPENDENCIES
      # =========================================================
      - name: Cache backend node modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-server-

      # =========================================================
      # INSTALL BACKEND DEPENDENCIES
      # =========================================================
      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      # =========================================================
      # CACHE FRONTEND DEPENDENCIES
      # =========================================================
      - name: Cache frontend node modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-client-

      # =========================================================
      # INSTALL FRONTEND DEPENDENCIES
      # =========================================================
      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      # =========================================================
      # BUILD FRONTEND
      # =========================================================
      - name: Build frontend
        working-directory: client
        run: npm run build --if-present

      # =========================================================
      # LOGIN TO DOCKER HUB
      # =========================================================
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =========================================================
      # BUILD & PUSH BACKEND IMAGE
      # =========================================================
      - name: Build and push backend image
        working-directory: server
        env:
          DOCKER_REPO: ${{ secrets.DOCKER_USERNAME }}/mindbridge-backend
          IMAGE_TAG: ${{ github.sha }}

        run: |
          SHORT_SHA=${IMAGE_TAG::8}

          docker build -t $DOCKER_REPO:$SHORT_SHA .
          docker tag $DOCKER_REPO:$SHORT_SHA $DOCKER_REPO:latest

          docker push $DOCKER_REPO:$SHORT_SHA
          docker push $DOCKER_REPO:latest

      # =========================================================
      # BUILD & PUSH FRONTEND IMAGE
      # =========================================================
      - name: Build and push frontend image
        working-directory: client
        env:
          DOCKER_REPO: ${{ secrets.DOCKER_USERNAME }}/mindbridge-frontend
          IMAGE_TAG: ${{ github.sha }}

        run: |
          SHORT_SHA=${IMAGE_TAG::8}

          docker build -t $DOCKER_REPO:$SHORT_SHA .
          docker tag $DOCKER_REPO:$SHORT_SHA $DOCKER_REPO:latest

          docker push $DOCKER_REPO:$SHORT_SHA
          docker push $DOCKER_REPO:latest

  # =========================================================
  # DEPLOY TO EC2
  # =========================================================
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:

      # =========================================================
      # SSH INTO EC2 & DEPLOY
      # =========================================================
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 20m

          script: |
            set -e

            # =========================================================
            # CREATE MAIN DIRECTORY
            # =========================================================
            mkdir -p ~/wellness

            # =========================================================
            # CLONE REPOSITORY IF NOT EXISTS
            # =========================================================
            if [ ! -d ~/wellness/MindBridge ]; then
              cd ~/wellness
              git clone https://github.com/somilshivhare/MindBridge
            fi

            # =========================================================
            # GO TO PROJECT DIRECTORY
            # =========================================================
            cd ~/wellness/MindBridge

            # =========================================================
            # PULL LATEST CODE
            # =========================================================
            git pull origin main

            # =========================================================
            # CREATE SERVER .ENV FILE
            # =========================================================
            mkdir -p server

            cat > server/.env <<EOF
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            NODE_ENV=production
            EOF

            # =========================================================
            # STOP OLD CONTAINERS
            # =========================================================
            docker compose down || true

            # =========================================================
            # PULL LATEST IMAGES
            # =========================================================
            docker compose pull

            # =========================================================
            # START CONTAINERS
            # =========================================================
            docker compose up -d --remove-orphans

            # =========================================================
            # CLEANUP UNUSED IMAGES
            # =========================================================
            docker image prune -f
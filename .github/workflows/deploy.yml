name: CI/CD Pipeline (Docker Hub + SSH deploy)

on:
  push:
    branches: [ main ]

# Keep global env minimal; prefer using secrets directly where needed
env:
  NODE_VERSION: 18

jobs:
  # 1) Lightweight test/install job: installs deps with cache for speed
  build:
    name: Install & Build Images
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node for optional build steps (frontend build if required)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache and install backend dependencies (faster on repeated runs)
      - name: Cache backend node modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-server-

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      # Cache and install frontend dependencies
      - name: Cache frontend node modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-client-

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      # Optional: build frontend assets (uncomment if Dockerfile expects built assets)
      - name: Build frontend (optional)
        if: fileExists('client/package.json')
        working-directory: client
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
          fi

      # Login to Docker Hub (required to push images)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & push backend image to Docker Hub
      - name: Build and push backend image
        working-directory: server
        env:
          DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/mindbridge-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Tag with short SHA and 'latest' for convenience
          SHORT_SHA=${IMAGE_TAG::8}
          docker build -t $DOCKERHUB_REPO:$SHORT_SHA .
          docker tag $DOCKERHUB_REPO:$SHORT_SHA $DOCKERHUB_REPO:latest
          docker push $DOCKERHUB_REPO:$SHORT_SHA
          docker push $DOCKERHUB_REPO:latest

      # Build & push frontend image to Docker Hub
      - name: Build and push frontend image
        working-directory: client
        env:
          DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/mindbridge-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA=${IMAGE_TAG::8}
          docker build -t $DOCKERHUB_REPO:$SHORT_SHA .
          docker tag $DOCKERHUB_REPO:$SHORT_SHA $DOCKERHUB_REPO:latest
          docker push $DOCKERHUB_REPO:$SHORT_SHA
          docker push $DOCKERHUB_REPO:latest

  # 2) Deploy job: SSH into EC2, create .env from secrets, pull and restart containers
  deploy:
    name: Deploy to EC2 via SSH
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH (create .env, pull images, restart)
        uses: appleboy/ssh-action@v1.7.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          timeout: 20m
          script: |
            set -euo pipefail

            # Working directory on the EC2 host where docker-compose.yml lives
            DEPLOY_DIR=~/wellness
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # Create .env from GitHub Secrets (kept only on the EC2 host)
            cat > .env <<'EOF'
MONGO_URI=${{ secrets.MONGO_URI }}
JWT_SECRET=${{ secrets.JWT_SECRET }}
EMAIL_USER=${{ secrets.EMAIL_USER }}
EMAIL_PASS=${{ secrets.EMAIL_PASS }}
NODE_ENV=production
EOF

            # Stop compose (ignore failure if not running)
            docker compose down || true

            # Pull the images referenced by your docker-compose.yml (should reference Docker Hub images)
            docker compose pull || true

            # Start containers with clean state
            docker compose up -d --remove-orphans

            # Optional: prune unused images (keeps disk tidy)
            docker image prune -f || true



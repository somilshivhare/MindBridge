name: CI/CD Pipeline (Docker Hub + SSH deploy)

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: 18

jobs:
  # =========================
  # BUILD & PUSH DOCKER IMAGES
  # =========================
  build:
    name: Install & Build Images
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache backend node_modules
      - name: Cache backend node modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-server-

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      # Cache frontend node_modules
      - name: Cache frontend node modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-client-

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      # Optional frontend build
      - name: Build frontend
        working-directory: client
        run: npm run build --if-present

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push Backend Image
      - name: Build and push backend image
        working-directory: server
        env:
          DOCKERHUB_REPO: ${{ secrets.DOCKER_USERNAME }}/mindbridge-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA=${IMAGE_TAG::8}

          docker build -t $DOCKERHUB_REPO:$SHORT_SHA .
          docker tag $DOCKERHUB_REPO:$SHORT_SHA $DOCKERHUB_REPO:latest

          docker push $DOCKERHUB_REPO:$SHORT_SHA
          docker push $DOCKERHUB_REPO:latest

      # Build & Push Frontend Image
      - name: Build and push frontend image
        working-directory: client
        env:
          DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/mindbridge-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA=${IMAGE_TAG::8}

          docker build -t $DOCKERHUB_REPO:$SHORT_SHA .
          docker tag $DOCKERHUB_REPO:$SHORT_SHA $DOCKERHUB_REPO:latest

          docker push $DOCKERHUB_REPO:$SHORT_SHA
          docker push $DOCKERHUB_REPO:latest

  # =========================
  # DEPLOY TO EC2
  # =========================
  deploy:
    name: Deploy to EC2 via SSH
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          timeout: 20m

          script: |
            set -euo pipefail

            # Project directory on EC2
            DEPLOY_DIR=~/wellness

            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # Create .env file
            cat > .env <<EOF
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            NODE_ENV=production
            EOF

            # Stop existing containers
            docker compose down || true

            # Pull latest images from Docker Hub
            docker compose pull || true

            # Start containers
            docker compose up -d --remove-orphans

            # Remove unused images
            docker image prune -f || true